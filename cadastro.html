<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <!-- CSS do Bootstrap via CDN para estilização (certifique-se de ter o arquivo local caso prefira) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="mb-4">Cadastro de Cliente</h2>
        <form id="formCadastro">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome Completo</label>
                <input type="text" class="form-control" id="nome" placeholder="Ex: João da Silva" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" placeholder="joao@exemplo.com" required>
            </div>
            <div class="mb-3">
                <label for="telefone" class="form-label">Telefone</label>
                <input type="tel" class="form-control" id="telefone" placeholder="(11) 99999-9999" required>
            </div>
            <div class="mb-3">
                <label for="endereco" class="form-label">Endereço</label>
                <input type="text" class="form-control" id="endereco" placeholder="Rua Exemplo, 123">
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar Cliente</button>
        </form>
        
        <!-- Div reservada para exibir mensagens de sucesso ou erro -->
        <div id="mensagem" class="mt-3"></div>
    </div>

    <!-- Script do Bootstrap já presente no seu projeto -->
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formCadastro').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede o envio padrão do formulário que recarregaria a página
            
            const nome = document.getElementById('nome').value;
            const divMensagem = document.getElementById('mensagem');
            
            // Exibe o alerta de sucesso do Bootstrap
            divMensagem.innerHTML = `<div class="alert alert-success alert-dismissible fade show" role="alert">
                Cliente <strong>${nome}</strong> cadastrado com sucesso!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>`;
            
            this.reset(); // Limpa os campos após enviar
        });
    </script>
</body>
</html>
