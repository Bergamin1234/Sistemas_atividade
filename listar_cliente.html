<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes</title>
    <!-- CSS do Bootstrap via CDN para estilização -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Clientes Cadastrados</h2>
            <!-- O link aponta para o seu arquivo principal de cadastro de clientes -->
            <a href="cadastro.html" class="btn btn-primary">Novo Cadastro</a>
        </div>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Nome Completo</th>
                        <th scope="col">E-mail</th>
                        <th scope="col">Telefone</th>
                        <th scope="col">Endereço</th>
                    </tr>
                </thead>
                <tbody id="tabelaClientes">
                    <!-- Os dados serão inseridos aqui via JavaScript -->
                </tbody>
            </table>
        </div>
        
        <!-- Mensagem caso não haja nenhum cliente -->
        <div id="mensagemVazia" class="alert alert-info d-none" role="alert">
            Nenhum cliente cadastrado no momento.
        </div>
    </div>

    <!-- Script do Bootstrap -->
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const clientes = JSON.parse(localStorage.getItem('clientes')) || [];
            const tbody = document.getElementById('tabelaClientes');
            const mensagemVazia = document.getElementById('mensagemVazia');

            if (clientes.length === 0) {
                mensagemVazia.classList.remove('d-none');
            } else {
                clientes.forEach(cliente => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${cliente.nome || ''}</td>
                        <td>${cliente.email || ''}</td>
                        <td>${cliente.telefone || ''}</td>
                        <td>${cliente.endereco || ''}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        });
    </script>
</body>
</html>
