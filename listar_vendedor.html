<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Vendedores</title>
    <!-- CSS do Bootstrap via CDN para estilização -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Vendedores Cadastrados</h2>
            <a href="cadastro_vendedor.html" class="btn btn-primary">Novo Cadastro</a>
        </div>
        
        <div class="table-responsive">
            <table class="table table-striped table-hover table-bordered">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">Nome Completo</th>
                        <th scope="col">E-mail</th>
                        <th scope="col">Telefone</th>
                        <th scope="col">Matrícula</th>
                    </tr>
                </thead>
                <tbody id="tabelaVendedores">
                    <!-- Os dados serão inseridos aqui via JavaScript -->
                </tbody>
            </table>
        </div>
        
        <!-- Mensagem caso não haja nenhum vendedor -->
        <div id="mensagemVazia" class="alert alert-info d-none" role="alert">
            Nenhum vendedor cadastrado no momento.
        </div>
    </div>

    <!-- Script do Bootstrap -->
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const vendedores = JSON.parse(localStorage.getItem('vendedores')) || [];
            const tbody = document.getElementById('tabelaVendedores');
            const mensagemVazia = document.getElementById('mensagemVazia');

            if (vendedores.length === 0) {
                mensagemVazia.classList.remove('d-none');
            } else {
                vendedores.forEach(vendedor => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${vendedor.nome}</td>
                        <td>${vendedor.email}</td>
                        <td>${vendedor.telefone}</td>
                        <td>${vendedor.matricula}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        });
    </script>
</body>
</html>
