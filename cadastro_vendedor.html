<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Vendedor</title>
    <!-- CSS do Bootstrap via CDN para estilização -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width: 600px;">
        <h2 class="mb-4">Cadastro de Vendedor</h2>
        <form id="formCadastroVendedor">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome Completo</label>
                <input type="text" class="form-control" id="nome" placeholder="Ex: Maria Souza" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" placeholder="maria@exemplo.com" required>
            </div>
            <div class="mb-3">
                <label for="telefone" class="form-label">Telefone</label>
                <input type="tel" class="form-control" id="telefone" placeholder="(11) 99999-9999" required>
            </div>
            <div class="mb-3">
                <label for="matricula" class="form-label">Matrícula</label>
                <input type="text" class="form-control" id="matricula" placeholder="Ex: VEND-1234" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar Vendedor</button>
        </form>
        
        <!-- Div reservada para exibir mensagens de sucesso ou erro -->
        <div id="mensagem" class="mt-3"></div>
    </div>

    <!-- Script do Bootstrap -->
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formCadastroVendedor').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede o envio padrão do formulário
            
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;
            const matricula = document.getElementById('matricula').value;
            const divMensagem = document.getElementById('mensagem');
            
            // Cria o objeto do vendedor e salva no localStorage simulando um banco de dados
            const vendedor = { nome, email, telefone, matricula };
            const vendedoresCadastrados = JSON.parse(localStorage.getItem('vendedores')) || [];
            vendedoresCadastrados.push(vendedor);
            localStorage.setItem('vendedores', JSON.stringify(vendedoresCadastrados));
            
            // Exibe o alerta de sucesso do Bootstrap
            divMensagem.innerHTML = `<div class="alert alert-success alert-dismissible fade show" role="alert">
                Vendedor(a) <strong>${nome}</strong> (Matrícula: ${matricula}) cadastrado(a) com sucesso!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>`;
            
            // Limpa o formulário após o cadastro
            event.target.reset();
        });
    </script>
</body>
</html>
