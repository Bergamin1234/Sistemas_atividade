<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Veículo</title>
    <!-- CSS do Bootstrap via CDN para estilização -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Cadastro de Veículo</h2>
            <a href="listar_veiculo.html" class="btn btn-outline-secondary">Voltar para Lista</a>
        </div>
        <form id="formCadastroVeiculo">
            <div class="mb-3">
                <label for="marca" class="form-label">Marca</label>
                <input type="text" class="form-control" id="marca" placeholder="Ex: Toyota" required>
            </div>
            <div class="mb-3">
                <label for="modelo" class="form-label">Modelo</label>
                <input type="text" class="form-control" id="modelo" placeholder="Ex: Corolla" required>
            </div>
            <div class="mb-3">
                <label for="ano" class="form-label">Ano de Fabricação</label>
                <input type="number" class="form-control" id="ano" placeholder="Ex: 2022" required>
            </div>
            <div class="mb-3">
                <label for="placa" class="form-label">Placa</label>
                <input type="text" class="form-control" id="placa" placeholder="Ex: ABC-1234" required>
            </div>
            <div class="mb-3">
                <label for="valor_diaria" class="form-label">Valor da Diária (R$)</label>
                <input type="number" step="0.01" class="form-control" id="valor_diaria" placeholder="Ex: 150.00" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Cadastrar Veículo</button>
        </form>
        
        <!-- Div reservada para exibir mensagens de sucesso ou erro -->
        <div id="mensagemVeiculo" class="mt-3"></div>
    </div>

    <!-- Script do Bootstrap -->
    <script src="assets/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('formCadastroVeiculo').addEventListener('submit', function(event) {
            event.preventDefault(); // Impede o envio padrão do formulário
            
            const marca = document.getElementById('marca').value;
            const modelo = document.getElementById('modelo').value;
            const ano = document.getElementById('ano').value;
            const placa = document.getElementById('placa').value;
            const valor_diaria = document.getElementById('valor_diaria').value;
            const divMensagem = document.getElementById('mensagemVeiculo');
            
            // Cria o objeto do veículo e salva no localStorage simulando um banco de dados
            const veiculo = { marca, modelo, ano, placa, valor_diaria };
            let veiculos = JSON.parse(localStorage.getItem('veiculos')) || [];
            veiculos.push(veiculo);
            localStorage.setItem('veiculos', JSON.stringify(veiculos));

            // Exibe o alerta de sucesso do Bootstrap
            divMensagem.innerHTML = `<div class="alert alert-success alert-dismissible fade show" role="alert">
                Veículo <strong>${marca} ${modelo}</strong> (Placa: ${placa}) cadastrado com sucesso!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>`;
            
            // Limpa o formulário após o cadastro
            event.target.reset();
        });
    </script>
</body>
</html>
